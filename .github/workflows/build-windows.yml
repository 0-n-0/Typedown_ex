name: Build Windows

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build:
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 16
          cache: yarn
          cache-dependency-path: Dev/Typedown.Editor/yarn.lock

      - name: Setup .NET Core 3.1 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 3.1.x

      - name: Install UWP build tools
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $installPath = & $vswhere -latest -products * -property installationPath
          $installer = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\setup.exe"
          & $installer modify `
            --installPath $installPath `
            --quiet `
            --wait `
            --norestart `
            --nocache `
            --add Microsoft.VisualStudio.Workload.UniversalBuildTools `
            --add Microsoft.VisualStudio.ComponentGroup.UWP.BuildTools `
            --add Microsoft.VisualStudio.Component.Windows11SDK.22621

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Install Yarn
        run: npm install --global yarn

      - name: Build editor static files
        working-directory: Dev/Typedown.Editor
        env:
          CI: false
        run: |
          yarn install --frozen-lockfile
          yarn build

      - name: Restore NuGet packages
        run: |
          msbuild Dev\Typedown.Core\Typedown.Core.csproj /t:Restore /p:Configuration=Debug_Local /p:Platform=x64 /p:TargetPlatformVersion=10.0.22621.0
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          msbuild Dev\Typedown\Typedown.csproj /t:Restore /p:Configuration=Debug_Local /p:Platform=x64 /p:TargetPlatformVersion=10.0.22621.0
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Build Typedown
        run: |
          New-Item -ItemType Directory -Force artifacts | Out-Null
          msbuild Dev\Typedown.Core\Typedown.Core.csproj /p:Configuration=Debug_Local /p:Platform=x64 /p:TargetPlatformVersion=10.0.22621.0 /p:RestorePackages=false "/flp:logfile=artifacts/msbuild-core.log;verbosity=normal"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          msbuild Dev\Typedown\Typedown.csproj /p:Configuration=Debug_Local /p:Platform=x64 /p:TargetPlatformVersion=10.0.22621.0 /p:RestorePackages=false "/flp:logfile=artifacts/msbuild-app.log;verbosity=normal"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload runnable build
        uses: actions/upload-artifact@v4
        with:
          name: Typedown-DebugLocal-x64
          path: Dev/Typedown/bin/x64/Debug_Local/netcoreapp3.1/win10-x64/**

      - name: Upload build logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: Typedown-build-logs
          path: artifacts/**
